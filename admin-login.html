<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Iskolarly</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;">

<div style="text-align:center;margin-bottom:32px;">
  <a href="index.html" class="navbar-brand" style="justify-content:center;display:inline-flex;">
    <div class="brand-icon" style="width:48px;height:48px;font-size:1.4rem;"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-graduation-cap-icon lucide-graduation-cap"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg></div>
    <div class="brand-text" style="text-align:left;">
      Iskolarly
      <span class="sub">Administrator Portal</span>
    </div>
  </a>
</div>

<div class="card" style="width:100%;max-width:440px;">
  <div style="text-align:center;margin-bottom:24px;">
    <div style="width:56px;height:56px;background:var(--navy);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 14px;"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FCFFFD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-keyhole-icon lucide-lock-keyhole"><circle cx="12" cy="16" r="1"/><rect x="3" y="10" width="18" height="12" rx="2"/><path d="M7 10V7a5 5 0 0 1 10 0v3"/></svg></div>
    <h2 style="font-size:1.4rem;margin-bottom:4px;">Admin Sign In</h2>
  </div>

  <div class="form-group">
    <label>Administrator ID <span class="required">*</span></label>
    <input type="text" class="form-control" id="a-id" placeholder="Enter your admin ID" />
  </div>
  <div class="form-group">
    <label>Password <span class="required">*</span></label>
    <div style="position:relative;">
      <input type="password" class="form-control" id="a-pass" placeholder="Enter your password" style="padding-right:44px;" />
      <button type="button" onclick="togglePass('a-pass')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);">👁</button>
    </div>
  </div>
  <div class="form-group">
    <label>Role <span class="required">*</span></label>
    <select class="form-control" id="a-role">
      <option value="">Select your role</option>
      <option>Administrator</option>
      <option>Super Administrator</option>
    </select>
  </div>

  <div id="login-error" style="display:none;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:var(--radius);padding:12px 14px;font-size:.875rem;margin-top:8px;"></div>

  <button class="btn btn-primary btn-lg w-full mt-8" onclick="adminLogin()" id="admin-login-btn">Sign In to Admin Portal</button>

  <hr class="divider" />
  <div class="text-center">
    <a href="login.html" style="font-size:.85rem;color:var(--muted);">← Back to Student Log in</a>
  </div>
</div>

<div class="toast-container" id="tc"></div>

<p style="color:rgba(255,255,255,.3);font-size:.75rem;margin-top:32px;text-align:center;">
  © 2025 Iskolarly. All rights reserved. Built for AY 2025–2026.<br>
  <a href="privacy.html" style="color:rgba(255,255,255,.35);">Privacy Policy</a> · <a href="terms.html" style="color:rgba(255,255,255,.35);">Terms</a>
</p>

<script>
  function togglePass(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('login-error').style.display = 'none';
  }

  function showToast(msg, type = 'success') {
    const tc = document.getElementById('tc');
    const t  = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${msg}</span>`;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  async function adminLogin() {
    hideError();
    const admin_id = document.getElementById('a-id').value.trim();
    const password = document.getElementById('a-pass').value;
    const role     = document.getElementById('a-role').value;

    if (!admin_id || !password || !role) {
      showError('Please complete all fields.');
      return;
    }

    const btn = document.getElementById('admin-login-btn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_id, password, role })
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.message || 'Invalid credentials. Please try again.');
        return;
      }

      showToast('Login successful! Redirecting…', 'success');
      setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1000);

    } catch {
      showError('Unable to connect to the server. Please try again later.');
    } finally {
      btn.textContent = 'Sign In to Admin Portal';
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
</script>
</body>
</html>
